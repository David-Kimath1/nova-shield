# NOVA-SHIELD Configuration
camera:
  device_id: 0
  width: 640
  height: 480

recognition:
  threshold: 0.6

security:
  lock_on_unknown_threshold: 3

notifications:
  telegram:
    enabled: false
  sms:
    enabled: false

hardware:
  gpu:
    enabled: true
    auto_fallback: true

storage:
  path: "./storage"

dashboard:
  enabled: true
  port: 8080
  host: "127.0.0.1"

logging:
  level: "INFO"
