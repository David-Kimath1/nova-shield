version: '3.8'

services:
  nova-shield:
    build: .
    container_name: nova-shield
    restart: unless-stopped
    ports:
      - "5000:5000"   # WebSocket dashboard
      - "8080:8080"   # HTTP dashboard
    volumes:
      - ./storage:/app/storage
      - /dev/video0:/dev/video0  # Camera device
    devices:
      - "/dev/video0:/dev/video0"
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    network_mode: host
    privileged: true  # Required for camera access
    
  # Optional: Redis for caching
  redis:
    image: redis:alpine
    container_name: nova-shield-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
